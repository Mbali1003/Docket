<section class="card">
    <h2>🔐 Sign Up</h2>

    <input type="text" id="fullName" placeholder="Full Name">

    <input type="email" id="email" placeholder="Email Address">

    <input type="password" id="password" placeholder="Password">

    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <button onclick="signUp()">Create Account</button>

    <p id="signupMessage"></p>
</section>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docket - AI Productivity Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Docket</h1>
    <p>Your AI Productivity Assistant</p>
</header>

<div class="container">

    <!-- Email Generator -->
    <section class="card">
        <h2>📧 Email Generator</h2>
        <input type="text" id="recipient" placeholder="Recipient">
        <input type="text" id="subject" placeholder="Subject">
        <textarea id="purpose" placeholder="What is the email about?"></textarea>
        <button onclick="generateEmail()">Generate Email</button>
        <textarea id="emailOutput" readonly></textarea>
    </section>

    <!-- Meeting Summarizer -->
    <section class="card">
        <h2>📝 Meeting Summarizer</h2>
        <textarea id="meetingNotes" placeholder="Paste meeting notes here..."></textarea>
        <button onclick="summarizeMeeting()">Summarize</button>
        <textarea id="meetingSummary" readonly></textarea>
    </section>

    <!-- Task Planner -->
    <section class="card">
        <h2>✅ Task Planner</h2>
        <input type="text" id="taskInput" placeholder="Enter a task">
        <button onclick="addTask()">Add Task</button>
        <ul id="taskList"></ul>
    </section>

    <!-- Research Assistant -->
    <section class="card">
        <h2>🔍 Research Assistant</h2>
        <input type="text" id="researchTopic" placeholder="Enter a topic">
        <button onclick="researchTopic()">Research</button>
        <textarea id="researchOutput" readonly></textarea>
    </section>

    <!-- AI Chatbot -->
    <section class="card">
        <h2>💬 AI Chatbot</h2>
        <input type="text" id="chatInput" placeholder="Ask a question">
        <button onclick="chatBot()">Send</button>
        <textarea id="chatOutput" readonly></textarea>
    </section>

</div>

<footer>
    <p>© 2026 Docket | AI Productivity Assistant</p>
</footer>

<script src="script.js"></script>

</body>
</html>
